name: 'Build and Push Action'
description: 'Internal composite action to handle the shared docker workflow logic'
inputs:
  matrix_version:
    description: 'The JSON stringified version matrix object'
    required: true
  docker_hub_token:
    description: 'Docker Hub Token'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Get current date
      id: date
      shell: bash
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Set unique build ID
      id: set-build-id
      shell: bash
      run: echo "BUILD_ID=build-${{ github.run_number }}" >> $GITHUB_ENV

    - name: Determine Docker tags
      id: meta
      shell: bash
      run: |
        # Parse matrix object elements using jq
        NAME=$(echo '${{ inputs.matrix_version }}' | jq -r '.name')
        TARGET_TAG=$(echo '${{ inputs.matrix_version }}' | jq -r '.tag')
        
        BRANCH_NAME=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
        
        TAGS="${{ github.repository_owner }}/$NAME:${BRANCH_NAME}"
        TAGS="$TAGS,${{ github.repository_owner }}/$NAME:${TARGET_TAG}"
        TAGS="$TAGS,${{ github.repository_owner }}/$NAME:${{ github.sha }}"
        TAGS="$TAGS,${{ github.repository_owner }}/$NAME:build-${{ github.run_number }}"
        TAGS="$TAGS,${{ github.repository_owner }}/$NAME:${{ steps.date.outputs.date }}"
        
        if [[ "$BRANCH_NAME" == "master" ]]; then
          TAGS="$TAGS,${{ github.repository_owner }}/$NAME:latest"
        fi
        
        echo "tags=$TAGS" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ github.repository_owner }}
        password: ${{ inputs.docker_hub_token }}

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: ${{ fromJson(inputs.matrix_version).context }}
        file: ${{ fromJson(inputs.matrix_version).dockerfile }}
        tags: ${{ steps.meta.outputs.tags }}
        build-args: |
          BUILD_ID=${{ env.BUILD_ID }}
          BUILD_DATE=${{ steps.date.outputs.date }}
        push: true
        labels: |
          maintainer=${{ github.repository_owner }}
          org.opencontainers.image.vendor=${{ github.repository_owner }}
          org.opencontainers.image.revision=${{ github.sha }}
